<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Intelli-Credit – AI Credit Decision System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: -0.5px;
    }

    .header p {
      color: #8b949e;
      font-size: 0.9rem;
      margin-top: 0.4rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #8b949e;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 1rem;
      padding: 0.65rem 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #58a6ff;
    }

    button {
      width: 100%;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.75rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    button:hover { background: #2ea043; }
    button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

    .result {
      margin-top: 1.5rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1.4rem;
      display: none;
    }

    .result.visible { display: block; }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid #21262d;
      font-size: 0.95rem;
    }

    .result-row:last-of-type { border-bottom: none; }

    .result-label { color: #8b949e; }

    .result-value { font-weight: 600; }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .badge-approved    { background: #1a4731; color: #3fb950; }
    .badge-conditional { background: #3d2b00; color: #d29922; }
    .badge-rejected    { background: #3d1a1a; color: #f85149; }

    .explanation {
      margin-top: 1rem;
      background: #161b22;
      border-left: 3px solid #58a6ff;
      border-radius: 0 6px 6px 0;
      padding: 0.9rem 1rem;
      font-size: 0.88rem;
      color: #c9d1d9;
      line-height: 1.6;
    }

    .error-msg {
      color: #f85149;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      text-align: center;
      display: none;
    }

    .error-msg.visible { display: block; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Intelli-Credit</h1>
      <p>AI-powered credit decision system</p>
    </div>

    <div class="card">
      <div class="form-group">
        <label for="revenue">Annual Revenue ($)</label>
        <input type="number" id="revenue" placeholder="e.g. 500000" min="1" />
      </div>
      <div class="form-group">
        <label for="profit">Annual Profit ($)</label>
        <input type="number" id="profit" placeholder="e.g. 80000" />
      </div>
      <div class="form-group">
        <label for="debt">Total Debt ($)</label>
        <input type="number" id="debt" placeholder="e.g. 120000" min="0" />
      </div>
      <div class="form-group">
        <label for="credit_score">Credit Score (300–850)</label>
        <input type="number" id="credit_score" placeholder="e.g. 720" min="300" max="850" />
      </div>

      <button id="submitBtn" onclick="submitForm()">Analyze Credit</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="result" id="result">
      <div class="result-row">
        <span class="result-label">Risk Score</span>
        <span class="result-value" id="riskScore">—</span>
      </div>
      <div class="result-row">
        <span class="result-label">Decision</span>
        <span class="result-value" id="decision">—</span>
      </div>
      <div class="result-row">
        <span class="result-label">Loan Amount</span>
        <span class="result-value" id="loanAmount">—</span>
      </div>
      <div class="explanation" id="explanation"></div>
    </div>
  </div>

  <script>
    // Change this to your deployed backend URL when deploying
    const API_URL = "http://localhost:8000/predict";

    function formatCurrency(val) {
      return "$" + Number(val).toLocaleString("en-US", { minimumFractionDigits: 2 });
    }

    function getBadgeClass(decision) {
      if (decision === "Approved") return "badge-approved";
      if (decision === "Conditional Approval") return "badge-conditional";
      return "badge-rejected";
    }

    async function submitForm() {
      const btn = document.getElementById("submitBtn");
      const errorMsg = document.getElementById("errorMsg");
      const resultEl = document.getElementById("result");

      const revenue = parseFloat(document.getElementById("revenue").value);
      const profit = parseFloat(document.getElementById("profit").value);
      const debt = parseFloat(document.getElementById("debt").value);
      const credit_score = parseInt(document.getElementById("credit_score").value);

      errorMsg.classList.remove("visible");
      resultEl.classList.remove("visible");

      if (!revenue || isNaN(profit) || isNaN(debt) || !credit_score) {
        errorMsg.textContent = "Please fill in all fields with valid numbers.";
        errorMsg.classList.add("visible");
        return;
      }

      if (revenue <= 0) {
        errorMsg.textContent = "Revenue must be greater than zero.";
        errorMsg.classList.add("visible");
        return;
      }

      if (credit_score < 300 || credit_score > 850) {
        errorMsg.textContent = "Credit score must be between 300 and 850.";
        errorMsg.classList.add("visible");
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Analyzing...';

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ revenue, profit, debt, credit_score }),
        });

        if (!res.ok) throw new Error("Server error");

        const data = await res.json();

        document.getElementById("riskScore").textContent = data.risk_score;
        document.getElementById("loanAmount").textContent = formatCurrency(data.loan_amount);

        const decisionEl = document.getElementById("decision");
        decisionEl.innerHTML = `<span class="badge ${getBadgeClass(data.decision)}">${data.decision}</span>`;

        document.getElementById("explanation").textContent = data.explanation;
        resultEl.classList.add("visible");

      } catch (err) {
        errorMsg.textContent = "Could not connect to the API. Make sure the backend is running.";
        errorMsg.classList.add("visible");
      } finally {
        btn.disabled = false;
        btn.textContent = "Analyze Credit";
      }
    }

    // Allow Enter key to submit
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") submitForm();
    });
  </script>
</body>
</html>
